<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" role="img" aria-labelledby="title desc">
  <title id="title">BusGPT logo</title>
  <desc id="desc">A route-shaped B mark with AI subscription nodes and the BusGPT wordmark.</desc>
  <defs>
    <linearGradient id="routeGradient" x1="34" x2="126" y1="26" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="0.5" stop-color="#2563eb" />
      <stop offset="1" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#111827" flood-opacity="0.12" />
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="24" y="20" width="120" height="120" rx="28" fill="#111827" />
    <path
      d="M63 112V48h27c18 0 29 9 29 24 0 8-4 15-11 19 9 4 15 12 15 23 0 17-12 27-32 27H63Z"
      fill="none"
      stroke="url(#routeGradient)"
      stroke-width="12"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M63 80h28"
      fill="none"
      stroke="#f9fafb"
      stroke-width="10"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle cx="92" cy="51" r="7" fill="#34d399" />
    <circle cx="105" cy="80" r="7" fill="#60a5fa" />
    <circle cx="95" cy="111" r="7" fill="#a78bfa" />
    <path
      d="M56 122c0 9 7 16 16 16h9"
      fill="none"
      stroke="#f9fafb"
      stroke-width="6"
      stroke-linecap="round"
      opacity="0.82"
    />
  </g>

  <g fill="#111827">
    <text x="176" y="84" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="54" font-weight="850" letter-spacing="0">
      BusGPT
    </text>
    <text x="180" y="116" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="18" font-weight="650" letter-spacing="1.2">
      AI SUBSCRIPTION RIDE-SHARING
    </text>
  </g>

  <g transform="translate(436 54)">
    <rect x="0" y="0" width="76" height="40" rx="20" fill="#f3f4f6" />
    <circle cx="22" cy="20" r="6" fill="#10b981" />
    <circle cx="38" cy="20" r="6" fill="#2563eb" />
    <circle cx="54" cy="20" r="6" fill="#8b5cf6" />
  </g>
</svg>
